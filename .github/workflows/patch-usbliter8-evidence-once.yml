name: One-shot usbliter8 Evidence Patch

on:
  push:
    branches:
      - engine/usbliter8-node-v1

permissions:
  contents: write

concurrency:
  group: usbliter8-evidence-patch-once
  cancel-in-progress: false

jobs:
  patch-and-remove-self:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: engine/usbliter8-node-v1
          fetch-depth: 0
      - name: Separate pre-exploit and post-exploit board identities
        run: |
          python - <<'PY'
          from pathlib import Path

          lib = Path("crates/tg-usbliter8/src/lib.rs")
          text = lib.read_text(encoding="utf-8")
          replacements = [
              (
                  "    pub observed_cpid: Option<String>,\n    pub initially_pwned: bool,\n    pub success_marker: bool,",
                  "    pub initial_cpid: Option<String>,\n    pub post_exploit_cpid: Option<String>,\n    pub initially_pwned: bool,\n    pub post_exploit_pwnd_observed: bool,\n    pub success_marker: bool,",
              ),
              (
                  "    let mut observed_cpid = None;\n    let mut initially_pwned = false;",
                  "    let mut initial_cpid = None;\n    let mut post_exploit_cpid = None;\n    let mut initially_pwned = false;\n    let mut post_exploit_pwnd_observed = false;\n    let mut identity_count = 0_usize;",
              ),
              (
                  "        if identity_line_expected {\n            observed_cpid = parse_tag(trimmed, \"CPID:\")\n                .map(|value| normalize_cpid(&value))\n                .transpose()?;\n            initially_pwned = trimmed.contains(\"PWND:[\");\n            identity_line_expected = false;\n        }",
                  "        if identity_line_expected {\n            let parsed_cpid = parse_tag(trimmed, \"CPID:\")\n                .map(|value| normalize_cpid(&value))\n                .transpose()?;\n            let pwnd = trimmed.contains(\"PWND:[\");\n            if identity_count == 0 {\n                initial_cpid = parsed_cpid;\n                initially_pwned = pwnd;\n            } else {\n                post_exploit_cpid = parsed_cpid;\n                post_exploit_pwnd_observed |= pwnd;\n            }\n            identity_count += 1;\n            identity_line_expected = false;\n        }",
              ),
              (
                  "        && unsupported_cpid.is_none()\n        && observed_cpid.is_some();",
                  "        && unsupported_cpid.is_none()\n        && initial_cpid.is_some()\n        && post_exploit_cpid.is_some()\n        && !initially_pwned\n        && post_exploit_pwnd_observed;",
              ),
              (
                  "        observed_cpid,\n        initially_pwned,\n        success_marker,",
                  "        initial_cpid,\n        post_exploit_cpid,\n        initially_pwned,\n        post_exploit_pwnd_observed,\n        success_marker,",
              ),
              (
                  "    if board.observed_cpid.as_deref() != Some(plan.expected_cpid.as_str()) {\n        failures.push(\"board observed a different or missing CPID\".to_owned());\n    }",
                  "    if board.initial_cpid.as_deref() != Some(plan.expected_cpid.as_str()) {\n        failures.push(\"board intake observed a different or missing CPID\".to_owned());\n    }\n    if board.post_exploit_cpid.as_deref() != Some(plan.expected_cpid.as_str()) {\n        failures.push(\"board post-exploit observation has a different or missing CPID\".to_owned());\n    }",
              ),
              (
                  "    if !board.success_marker || !board.self_verified_pwnd {\n        failures.push(\"board did not produce self-verified pwn success\".to_owned());\n    }",
                  "    if !board.success_marker\n        || !board.self_verified_pwnd\n        || !board.post_exploit_pwnd_observed\n    {\n        failures.push(\"board did not produce self-verified pwn success\".to_owned());\n    }",
              ),
          ]
          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f"missing lib patch target:\n{old}")
              text = text.replace(old, new, 1)
          lib.write_text(text, encoding="utf-8")

          tests = Path("crates/tg-usbliter8/tests/node.rs")
          text = tests.read_text(encoding="utf-8")
          replacements = [
              (
                  "b\"============ usbliter8 v1.0 ============\\ngot Apple DFU device:\\nCPID:8020 CPRV:11 CPFM:03 ECID:DEADBEEF00000001\\ntook - 812ms\\nexploit SUCCESS!\\n\".to_vec()",
                  "b\"============ usbliter8 v1.0 ============\\ngot Apple DFU device:\\nCPID:8020 CPRV:11 CPFM:03 ECID:DEADBEEF00000001\\ngot Apple DFU device:\\nCPID:8020 CPRV:11 CPFM:03 ECID:DEADBEEF00000001 PWND:[usbliter8]\\ntook - 812ms\\nexploit SUCCESS!\\n\".to_vec()",
              ),
              (
                  "    assert_eq!(evidence.observed_cpid.as_deref(), Some(\"8020\"));\n    assert!(evidence.success_marker);",
                  "    assert_eq!(evidence.initial_cpid.as_deref(), Some(\"8020\"));\n    assert_eq!(\n        evidence.post_exploit_cpid.as_deref(),\n        Some(\"8020\")\n    );\n    assert!(!evidence.initially_pwned);\n    assert!(evidence.post_exploit_pwnd_observed);\n    assert!(evidence.success_marker);",
              ),
          ]
          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f"missing test patch target:\n{old}")
              text = text.replace(old, new, 1)
          tests.write_text(text, encoding="utf-8")
          PY
          cargo fmt --all
          rm .github/workflows/patch-usbliter8-evidence-once.yml
          git config user.name "TGCHECKM8 CI"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "fix: distinguish initial and post-exploit board identity"
          git push origin HEAD:engine/usbliter8-node-v1
