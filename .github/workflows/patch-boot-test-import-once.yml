name: One-shot boot test import fix

on:
  push:
    branches: [runtime/gaster-ramdisk-v1]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: runtime/gaster-ramdisk-v1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Remove unused test import and remove workflow
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('crates/tg-ramdisk-boot/tests/boot.rs')
          text = path.read_text(encoding='utf-8')
          old = 'use std::path::{Path, PathBuf};'
          if text.count(old) != 1:
              raise SystemExit('expected one path import')
          path.write_text(text.replace(old, 'use std::path::PathBuf;'), encoding='utf-8')
          PY
          cargo fmt --all
          rm .github/workflows/patch-boot-test-import-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix ramdisk boot test imports"
          git push origin HEAD:runtime/gaster-ramdisk-v1
