name: One-shot Purple Formatter

on:
  push:
    branches:
      - service/purple-contracts-v1

permissions:
  contents: write

concurrency:
  group: purple-autoformat-once
  cancel-in-progress: false

jobs:
  format-and-remove-self:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: service/purple-contracts-v1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format and remove one-shot workflow
        run: |
          cargo fmt --all
          rm .github/workflows/autoformat-purple-once.yml
          git config user.name "TGCHECKM8 CI"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No formatter changes were required."
            exit 0
          fi
          git commit -m "style: apply rustfmt to Purple contracts"
          git push origin HEAD:service/purple-contracts-v1
