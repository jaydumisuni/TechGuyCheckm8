name: One-shot Phase 5H formatter

on:
  push:
    branches: [service/syscfg-selected-write-v1]

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: service/syscfg-selected-write-v1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format and remove one-shot workflow
        run: |
          cargo fmt --all
          rm .github/workflows/format-phase5h.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Format Phase 5H selected write transport"
          git push origin HEAD:service/syscfg-selected-write-v1
