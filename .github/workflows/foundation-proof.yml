name: TGCHECKM8 Branch Formatter

on:
  push:
    branches:
      - service/serial-platform-v1

permissions:
  contents: write

jobs:
  format-and-restore:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format branch and restore proof workflow
        run: |
          set -euo pipefail
          cargo fmt --all
          git show origin/main:.github/workflows/foundation-proof.yml > .github/workflows/foundation-proof.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml crates/tg-serial-platform .github/workflows/foundation-proof.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Phase 5E: apply rustfmt and restore proof workflow"
          git push origin HEAD:service/serial-platform-v1
