name: TGCHECKM8 Branch Patch

on:
  push:
    branches:
      - service/serial-platform-v1

permissions:
  contents: write

jobs:
  patch-format-restore:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply typed reservation patch
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          lib = Path("crates/tg-serial-platform/src/lib.rs")
          text = lib.read_text(encoding="utf-8")
          text = text.replace("let mut port = build_port(port_name, settings)", "let port = build_port(port_name, settings)", 1)

          old = '''#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]
          pub struct PlatformDoctorSession {
              pub report: SerialDoctorReport,
              pub lease: LeaseGrant,
          }

          pub fn reserve_and_run_doctor<P: SerialOpenProbe>(
              manifest: &SerialDoctorManifest,
              context: &SerialDoctorContext,
              host: HostPlatform,
              observations: &[RawSerialPortObservation],
              probe: &mut P,
              leases: &mut LeaseManager,
              owner: LeaseOwner,
              current_tick: u64,
              ttl_ticks: u64,
          ) -> Result<PlatformDoctorSession, SerialPlatformError> {
              if owner.session_id != context.session_id {
                  return Err(SerialPlatformError::LeaseSessionMismatch);
              }
              let selected = select_candidate(manifest, host.clone(), observations)
                  .map_err(SerialPlatformError::Doctor)?;
              let lease = acquire_preopen_lease(leases, &selected, owner.clone(), current_tick, ttl_ticks)?;

              let result = run_doctor(manifest, context, host, observations, probe);
              let (_, report) = match result {
                  Ok(value) => value,
                  Err(error) => {
                      let _ = leases.release(lease.lease_id, &owner);
                      return Err(SerialPlatformError::Doctor(error));
                  }
              };
              if report.candidate.hardware_fingerprint != selected.receipt.hardware_fingerprint {
                  let _ = leases.release(lease.lease_id, &owner);
                  return Err(SerialPlatformError::CandidateChangedDuringProbe);
              }
              if report.verdict != SerialDoctorVerdict::Ready {
                  let _ = leases.release(lease.lease_id, &owner);
                  return Err(SerialPlatformError::DoctorBlocked(report.failures));
              }
              Ok(PlatformDoctorSession { report, lease })
          }
          '''
          new = '''#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]
          pub struct PlatformDoctorSession {
              pub report: SerialDoctorReport,
              pub lease: LeaseGrant,
          }

          #[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]
          pub struct PlatformDoctorReservation {
              pub owner: LeaseOwner,
              pub current_tick: u64,
              pub ttl_ticks: u64,
          }

          pub fn reserve_and_run_doctor<P: SerialOpenProbe>(
              manifest: &SerialDoctorManifest,
              context: &SerialDoctorContext,
              host: HostPlatform,
              observations: &[RawSerialPortObservation],
              probe: &mut P,
              leases: &mut LeaseManager,
              reservation: PlatformDoctorReservation,
          ) -> Result<PlatformDoctorSession, SerialPlatformError> {
              if reservation.owner.session_id != context.session_id {
                  return Err(SerialPlatformError::LeaseSessionMismatch);
              }
              let selected = select_candidate(manifest, host.clone(), observations)
                  .map_err(SerialPlatformError::Doctor)?;
              let lease = acquire_preopen_lease(
                  leases,
                  &selected,
                  reservation.owner.clone(),
                  reservation.current_tick,
                  reservation.ttl_ticks,
              )?;

              let result = run_doctor(manifest, context, host, observations, probe);
              let (_, report) = match result {
                  Ok(value) => value,
                  Err(error) => {
                      let _ = leases.release(lease.lease_id, &reservation.owner);
                      return Err(SerialPlatformError::Doctor(error));
                  }
              };
              if report.candidate.hardware_fingerprint != selected.receipt.hardware_fingerprint {
                  let _ = leases.release(lease.lease_id, &reservation.owner);
                  return Err(SerialPlatformError::CandidateChangedDuringProbe);
              }
              if report.verdict != SerialDoctorVerdict::Ready {
                  let _ = leases.release(lease.lease_id, &reservation.owner);
                  return Err(SerialPlatformError::DoctorBlocked(report.failures));
              }
              Ok(PlatformDoctorSession { report, lease })
          }
          '''
          if old not in text:
              raise SystemExit("expected reserve_and_run_doctor block not found")
          text = text.replace(old, new, 1)
          lib.write_text(text, encoding="utf-8")

          tests = Path("crates/tg-serial-platform/tests/platform_flow.rs")
          test_text = tests.read_text(encoding="utf-8")
          test_text = test_text.replace(
              "OpenSafetyAcknowledgement, SerialPlatformError, SerialportOpenProbe,",
              "OpenSafetyAcknowledgement, PlatformDoctorReservation, SerialPlatformError, SerialportOpenProbe,",
              1,
          )
          old_args = '''        owner,
                  10,
                  30,
          '''
          count = test_text.count(old_args)
          if count != 3:
              raise SystemExit(f"expected 3 reservation argument blocks, found {count}")
          test_text = test_text.replace(
              old_args,
              '''        PlatformDoctorReservation {
                      owner,
                      current_tick: 10,
                      ttl_ticks: 30,
                  },
          ''',
          )
          tests.write_text(test_text, encoding="utf-8")
          PY
          cargo fmt --all
          git show origin/main:.github/workflows/foundation-proof.yml > .github/workflows/foundation-proof.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/tg-serial-platform .github/workflows/foundation-proof.yml
          git commit -m "Phase 5E: type reservation request and restore proof workflow"
          git push origin HEAD:service/serial-platform-v1
