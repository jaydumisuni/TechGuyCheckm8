name: TGCHECKM8 Branch Patch

on:
  push:
    branches:
      - service/serial-platform-v1

permissions:
  contents: write

jobs:
  patch-format-restore:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply checked patch and restore proof workflow
        run: |
          set -euo pipefail
          python scripts/phase5e_serial_reservation_patch.py
          cargo fmt --all
          rm scripts/phase5e_serial_reservation_patch.py
          git show origin/main:.github/workflows/foundation-proof.yml > .github/workflows/foundation-proof.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/tg-serial-platform scripts .github/workflows/foundation-proof.yml
          git commit -m "Phase 5E: type reservation request and restore proof workflow"
          git push origin HEAD:service/serial-platform-v1
