name: One-shot Purple MSRV Patch

on:
  push:
    branches:
      - service/purple-contracts-v1

permissions:
  contents: write

concurrency:
  group: purple-msrv-patch-once
  cancel-in-progress: false

jobs:
  patch-and-remove-self:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: service/purple-contracts-v1
          fetch-depth: 0
      - name: Apply Rust 1.80-compatible expression and remove workflow
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("crates/tg-purple/src/lib.rs")
          text = path.read_text(encoding="utf-8")
          old = ".as_deref()\n            .is_none_or(str::is_empty)"
          new = ".as_deref()\n            .map_or(true, str::is_empty)"
          if old not in text:
              raise SystemExit("expected MSRV expression was not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          rm .github/workflows/patch-purple-msrv-once.yml
          git config user.name "TGCHECKM8 CI"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "fix: preserve Rust 1.80 compatibility in Purple contracts"
          git push origin HEAD:service/purple-contracts-v1
