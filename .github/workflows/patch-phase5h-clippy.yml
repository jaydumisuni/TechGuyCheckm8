name: One-shot Phase 5H Clippy patch

on:
  push:
    branches: [service/syscfg-selected-write-v1]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: service/syscfg-selected-write-v1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply checked alias patch and remove workflow
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("crates/tg-syscfg-write-transport/tests/write_flow.rs")
          text = path.read_text(encoding="utf-8")
          old = '''struct ScriptedTransport {
              steps: VecDeque<(Vec<u8>, Result<Vec<u8>, String>)>,
              observed: Vec<Vec<u8>>,
          }

          impl ScriptedTransport {
              fn new(steps: Vec<(Vec<u8>, Result<Vec<u8>, String>)>) -> Self {
          '''
          new = '''type ScriptedExchangeResult = Result<Vec<u8>, String>;
          type ScriptedExchange = (Vec<u8>, ScriptedExchangeResult);

          struct ScriptedTransport {
              steps: VecDeque<ScriptedExchange>,
              observed: Vec<Vec<u8>>,
          }

          impl ScriptedTransport {
              fn new(steps: Vec<ScriptedExchange>) -> Self {
          '''
          if text.count(old) != 1:
              raise SystemExit("expected scripted transport block was not found exactly once")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          cargo fmt --all
          rm .github/workflows/patch-phase5h-clippy.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Name Phase 5H scripted exchange types"
          git push origin HEAD:service/syscfg-selected-write-v1
