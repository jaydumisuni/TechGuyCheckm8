name: One-shot Apple route formatter

on:
  push:
    branches: [integration/apple-known-good-route-v1]

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/apple-known-good-route-v1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format and remove this workflow
        run: |
          cargo fmt --all
          rm .github/workflows/format-apple-route-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Format Apple route reference crate"
          git push origin HEAD:integration/apple-known-good-route-v1
