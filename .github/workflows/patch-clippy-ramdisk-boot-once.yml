name: One-shot ramdisk boot Clippy fix

on:
  push:
    branches: [runtime/gaster-ramdisk-v1]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: runtime/gaster-ramdisk-v1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Reduce error payload, format, and remove workflow
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('crates/tg-ramdisk-boot/src/lib.rs')
          text = path.read_text(encoding='utf-8')
          old_call = 'return Err(RamdiskBootError::ProcessStepFailed(receipt));'
          new_call = '''return Err(RamdiskBootError::ProcessStepFailed {
              step_index: receipt.step_index,
              status_code: receipt.status_code,
              cleanup_verified: receipt.cleanup_verified,
          });'''
          old_variant = '''    #[error("iRecovery process step failed: {0:?}")]
              ProcessStepFailed(BootProcessReceipt),'''
          new_variant = '''    #[error(
              "iRecovery process step {step_index} failed: status={status_code:?}, cleanup={cleanup_verified}"
          )]
              ProcessStepFailed {
                  step_index: usize,
                  status_code: Option<i32>,
                  cleanup_verified: bool,
              },'''
          if text.count(old_call) != 1:
              raise SystemExit('expected one ProcessStepFailed call')
          if text.count(old_variant) != 1:
              raise SystemExit('expected one ProcessStepFailed variant')
          text = text.replace(old_call, new_call).replace(old_variant, new_variant)
          path.write_text(text, encoding='utf-8')
          PY
          cargo fmt --all
          rm .github/workflows/patch-clippy-ramdisk-boot-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Reduce ramdisk boot error payload"
          git push origin HEAD:runtime/gaster-ramdisk-v1
