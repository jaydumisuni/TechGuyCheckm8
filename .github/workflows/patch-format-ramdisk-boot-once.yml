name: One-shot ramdisk boot patch and formatter

on:
  push:
    branches: [runtime/gaster-ramdisk-v1]

permissions:
  contents: write

jobs:
  patch-format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: runtime/gaster-ramdisk-v1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Add ordered checkpoint contract, format, and remove workflow
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('crates/tg-ramdisk-pack/src/lib.rs')
          text = path.read_text(encoding='utf-8')
          old = '#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\n#[serde(rename_all = "snake_case")]\npub enum BootCheckpoint {'
          new = '#[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Serialize, Deserialize)]\n#[serde(rename_all = "snake_case")]\npub enum BootCheckpoint {'
          if text.count(old) != 1:
              raise SystemExit('expected exactly one BootCheckpoint derive block')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          cargo fmt --all
          rm .github/workflows/patch-format-ramdisk-boot-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Format and order ramdisk boot contracts"
          git push origin HEAD:runtime/gaster-ramdisk-v1
